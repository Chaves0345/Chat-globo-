<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#010103">
    <title>Elite Chat | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #007bff; --accent: #00d4ff; --bg: #010103; 
            --glass: rgba(255, 255, 255, 0.06); --text: #fff;
            --neon: 0 0 15px rgba(0, 123, 255, 0.5);
        }

        /* PALETA DE TEMAS */
        [data-theme="matrix"] { --primary: #00ff41; --accent: #008f11; --bg: #000; --neon: 0 0 15px rgba(0, 255, 65, 0.5); }
        [data-theme="cyber"] { --primary: #ff007f; --accent: #00f2ff; --bg: #0d001a; --neon: 0 0 15px rgba(255, 0, 127, 0.5); }
        [data-theme="gold"] { --primary: #ffcc00; --accent: #ffffff; --bg: #0f0b00; --neon: 0 0 15px rgba(255, 204, 0, 0.5); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; position: fixed; transition: background 0.5s ease; }

        #starCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* ANIMAÇÕES DE TELA */
        .screen { 
            position: absolute; inset: 0; padding: 25px; padding-top: 60px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; visibility: hidden; opacity: 0; transform: translateX(30px) scale(0.95);
        }
        .screen-active { visibility: visible; opacity: 1; transform: translateX(0) scale(1); }

        /* MENSAGENS E PFP */
        .msg-bubble { margin: 12px 0; max-width: 85%; display: flex; align-items: flex-end; gap: 10px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
        
        .pfp-msg { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; box-shadow: var(--neon); }
        .msg-content { padding: 14px; border-radius: 22px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05); font-size: 14px; line-height: 1.4; }
        .me { align-self: flex-end; flex-direction: row-reverse; }
        .me .msg-content { background: var(--primary); box-shadow: var(--neon); border: none; }

        /* MENU INFERIOR ANIMADO */
        .nav-bar { 
            position: fixed; bottom: -100px; left: 0; width: 100%; height: 85px; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; align-items: center; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-bar.show { bottom: 0; }
        .nav-btn { font-size: 28px; opacity: 0.3; transition: 0.3s; padding: 10px; border-radius: 50%; }
        .nav-btn.active { opacity: 1; color: var(--primary); transform: translateY(-5px); text-shadow: var(--neon); }

        /* BOTÕES E INPUTS */
        input, textarea { width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 20px; color: white; outline: none; margin-bottom: 15px; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: var(--neon); }
        button { border: none; background: linear-gradient(135deg, var(--primary), var(--accent)); padding: 16px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.95); }

        #custom-toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: var(--primary); padding: 14px 30px; border-radius: 50px; 
            box-shadow: var(--neon); z-index: 10000; transition: 0.5s; font-weight: bold;
        }
        #custom-toast.show { top: 40px; }
    </style>
</head>
<body data-theme="default">

<canvas id="starCanvas"></canvas>
<div id="custom-toast">Elite OS Atualizado</div>

<div id="fs-overlay" onclick="this.style.display='none'" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9000; display:none; align-items:center; justify-content:center; backdrop-filter: blur(10px);">
    <img id="fs-img" src="" style="max-width:95%; max-height:90%; border-radius:20px; box-shadow: 0 0 40px #000;">
</div>

<div class="app-container">
    <div id="login-screen" class="screen screen-active">
        <center style="margin-top:15vh">
            <h1 style="font-size:50px; text-shadow: var(--neon); letter-spacing:8px">ELITE</h1>
            <p style="opacity:0.4; margin-bottom:50px; letter-spacing:2px">SISTEMA DE COMUNICAÇÃO</p>
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnEntrar" style="width:100%; box-shadow: var(--neon)">ENTRAR NO SISTEMA</button>
            <button onclick="navigateTo('register-screen')" style="background:none; margin-top:25px; opacity:0.6">Registrar Novo Acesso</button>
        </center>
    </div>

    <div id="register-screen" class="screen">
        <h2 style="margin-bottom:20px">Novo Registo</h2>
        <center>
            <div style="position:relative; width:130px; height:130px; margin-bottom:30px">
                <img id="regPfpPreview" src="https://via.placeholder.com/150" style="width:100%; height:100%; border-radius:50%; object-fit:cover; border:3px solid var(--primary)">
                <button onclick="document.getElementById('regPfpInput').click()" style="position:absolute; bottom:0; right:0; width:45px; height:45px; border-radius:50%; padding:0">📷</button>
            </div>
            <input type="file" id="regPfpInput" hidden accept="image/*">
        </center>
        <input type="text" id="regNome" placeholder="Codinome">
        <input type="email" id="regEmail" placeholder="E-mail">
        <input type="password" id="regPass" placeholder="Senha">
        <button id="btnConfirmarReg" style="width:100%">FINALIZAR REGISTRO</button>
    </div>

    <div id="home-screen" class="screen">
        <h1 style="margin-bottom:30px; font-weight:800">Serviços</h1>
        <div onclick="navigateTo('chat-screen')" style="background:linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); padding:35px; border-radius:30px; border-left: 8px solid var(--primary); margin-bottom:20px">
            <strong style="font-size:22px">HUB GLOBAL</strong><br>
            <small style="opacity:0.5">Mensagens encriptadas ponta-a-ponta</small>
        </div>
        <div onclick="nextTheme()" style="background:var(--glass); padding:25px; border-radius:25px; border:1px solid rgba(255,255,255,0.05)">
            🎨 <strong>ESTILO VISUAL</strong><br>
            <small id="themeName">Tema Atual: Neon Blue</small>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <h1 style="margin-bottom:25px">Agente</h1>
        <center>
            <div style="position:relative; width:140px; height:140px; margin-bottom:20px">
                <img id="profImg" src="https://via.placeholder.com/150" style="width:100%; height:100%; border-radius:50%; border:3px solid var(--primary); object-fit:cover">
                <button onclick="document.getElementById('profPfpInput').click()" style="position:absolute; bottom:0; right:0; width:45px; height:45px; border-radius:50%; padding:0">📂</button>
            </div>
            <input type="file" id="profPfpInput" hidden accept="image/*">
            <h2 id="displayNome">---</h2>
        </center>
        <div style="background:var(--glass); border-radius:30px; padding:25px; margin-top:20px">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:10px">
                <span id="rankLabel">RANK: RECRUTA</span> <span id="xpLabel">0 XP</span>
            </div>
            <div style="width:100%; height:8px; background:#000; border-radius:10px; overflow:hidden">
                <div id="xpBar" style="height:100%; width:0%; background:linear-gradient(90deg, var(--primary), var(--accent)); transition: 1s;"></div>
            </div>
            <input type="text" id="profNomeInput" placeholder="Nome" style="margin-top:20px">
            <textarea id="profBio" rows="2" placeholder="Sua bio..."></textarea>
            <button id="btnSalvarPerfil" style="width:100%">SALVAR PERFIL</button>
        </div>
        <button id="btnSair" style="margin-top:auto; background:none; color:#ff4757">TERMINAR SESSÃO</button>
    </div>

    <div id="chat-screen" class="screen" style="padding-bottom:110px; padding-top:25px">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px">
            <button onclick="navigateTo('home-screen')" style="background:none; font-size:25px; padding:0">←</button>
            <strong>CANAL GLOBAL</strong>
        </div>
        <div id="chat-msgs" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:12px"></div>
        <div style="display:flex; gap:12px; align-items:center; background:rgba(0,0,0,0.5); padding:12px; border-radius:28px; backdrop-filter:blur(15px)">
            <button onclick="document.getElementById('chatMedia').click()" style="width:48px; height:48px; border-radius:50%; background:var(--glass)">📎</button>
            <input type="file" id="chatMedia" hidden accept="image/*,video/*">
            <input type="text" id="msgInput" placeholder="Escrever sinal..." style="margin:0; flex:1; background:transparent; border:none">
            <button id="btnEnviar" style="width:48px; height:48px; border-radius:50%">➤</button>
        </div>
    </div>

    <div class="nav-bar" id="main-nav">
        <div class="nav-btn" onclick="navigateTo('home-screen')">🏠</div>
        <div class="nav-btn" onclick="navigateTo('profile-screen')">👤</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, onSnapshot, orderBy, serverTimestamp, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANKLtlqp8lb1En3SoONAoQHPa3bENTNG4",
        authDomain: "chat-61862.firebaseapp.com",
        projectId: "chat-61862",
        storageBucket: "chat-61862.firebasestorage.app",
        messagingSenderId: "843380257397",
        appId: "1:843380257397:web:d349c321c12b6f9aa0be3c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUid, currentUser;

    // --- TEMAS AVANÇADOS ---
    const themes = ['default', 'matrix', 'cyber', 'gold'];
    const themeNames = ['Neon Blue', 'Matrix Green', 'Cyber Pink', 'Gold Edition'];
    let themeIdx = 0;

    window.nextTheme = () => {
        themeIdx = (themeIdx + 1) % themes.length;
        document.body.dataset.theme = themes[themeIdx];
        document.getElementById('themeName').innerText = `Tema Atual: ${themeNames[themeIdx]}`;
        showToast(`Tema ${themeNames[themeIdx]} Ativado`);
    };

    // --- NAVEGAÇÃO COM ANIMAÇÃO ---
    window.navigateTo = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
        document.getElementById(id).classList.add('screen-active');
        
        // Atualiza ícones do menu
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(id === 'home-screen') document.querySelectorAll('.nav-btn')[0].classList.add('active');
        if(id === 'profile-screen') document.querySelectorAll('.nav-btn')[1].classList.add('active');

        document.getElementById('main-nav').classList.toggle('show', id === 'home-screen' || id === 'profile-screen' || id === 'chat-screen');
    };

    window.showToast = (msg) => {
        const t = document.getElementById('custom-toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    };

    // --- PROCESSAMENTO DE IMAGEM (FIX) ---
    const handleImage = (file, callback) => {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => callback(e.target.result);
        reader.readAsDataURL(file);
    };

    document.getElementById('regPfpInput').onchange = (e) => handleImage(e.target.files[0], (url) => document.getElementById('regPfpPreview').src = url);
    
    document.getElementById('profPfpInput').onchange = (e) => {
        handleImage(e.target.files[0], async (url) => {
            document.getElementById('profImg').src = url;
            await updateDoc(doc(db, "usuarios", currentUid), { pfp: url });
            showToast("Foto de Perfil Atualizada!");
        });
    };

    // --- AUTENTICAÇÃO ---
    onAuthStateChanged(auth, async user => {
        if(user) {
            currentUid = user.uid;
            const uRef = doc(db, "usuarios", user.uid);
            const uSnap = await getDoc(uRef);
            if(!uSnap.exists()) {
                await setDoc(uRef, { nome: user.email.split('@')[0], pfp: "", xp: 0, bio: "Agente Elite" });
            }
            onSnapshot(uRef, d => {
                currentUser = d.data();
                document.getElementById('displayNome').innerText = currentUser.nome;
                document.getElementById('profNomeInput').value = currentUser.nome;
                document.getElementById('profBio').value = currentUser.bio || "";
                if(currentUser.pfp) document.getElementById('profImg').src = currentUser.pfp;
                
                const xp = currentUser.xp || 0;
                document.getElementById('xpLabel').innerText = `${xp % 100}/100 XP`;
                document.getElementById('xpBar').style.width = (xp % 100) + "%";
                document.getElementById('rankLabel').innerText = xp >= 500 ? "RANK: ELITE" : "RANK: RECRUTA";
                
                if(document.querySelector('.screen-active').id === 'login-screen') navigateTo('home-screen');
            });
        } else navigateTo('login-screen');
    });

    // --- CHAT E MÍDIA (FIX) ---
    const sendMsg = async (text = "", media = null, type = "text") => {
        if(!text && !media) return;
        await addDoc(collection(db, "mensagens"), {
            texto: text, media: media, tipo: type,
            uid: currentUid, usuario: currentUser.nome, pfp: currentUser.pfp || "",
            createdAt: serverTimestamp()
        });
        await updateDoc(doc(db, "usuarios", currentUid), { xp: increment(5) });
    };

    document.getElementById('btnEnviar').onclick = () => {
        const inp = document.getElementById('msgInput');
        if(inp.value.trim()) { sendMsg(inp.value); inp.value = ""; }
    };

    document.getElementById('chatMedia').onchange = (e) => {
        const file = e.target.files[0];
        handleImage(file, (url) => {
            sendMsg("", url, file.type.split('/')[0]);
            showToast("Mídia Enviada!");
        });
    };

    onSnapshot(query(collection(db, "mensagens"), orderBy("createdAt", "asc")), snaps => {
        const area = document.getElementById('chat-msgs');
        area.innerHTML = "";
        snaps.forEach(d => {
            const m = d.data();
            const isMe = m.uid === currentUid;
            const div = document.createElement('div');
            div.className = `msg-bubble ${isMe ? 'me' : ''}`;
            div.innerHTML = `
                <img src="${m.pfp || 'https://via.placeholder.com/150'}" class="pfp-msg">
                <div class="msg-content">
                    <small style="color:var(--accent); font-weight:bold; font-size:10px">${m.usuario}</small><br>
                    ${m.media ? (m.tipo === 'video' ? `<video src="${m.media}" controls style="width:100%; border-radius:15px">` : `<img src="${m.media}" style="width:100%; border-radius:15px" onclick="openFS('${m.media}')">`) : m.texto}
                </div>`;
            area.appendChild(div);
        });
        area.scrollTop = area.scrollHeight;
    });

    window.openFS = (u) => { document.getElementById('fs-img').src = u; document.getElementById('fs-overlay').style.display = 'flex'; };

    // --- REGISTRO E LOGIN ---
    document.getElementById('btnEntrar').onclick = async () => {
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
            showToast("Acesso Autorizado");
        } catch { showToast("Erro no Acesso"); }
    };

    document.getElementById('btnConfirmarReg').onclick = async () => {
        const e = document.getElementById('regEmail').value;
        const p = document.getElementById('regPass').value;
        const n = document.getElementById('regNome').value;
        const img = document.getElementById('regPfpPreview').src;
        try {
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "usuarios", res.user.uid), { nome: n, pfp: img, xp: 0, bio: "" });
            showToast("Registro Concluído");
        } catch { showToast("Erro no Registro"); }
    };

    document.getElementById('btnSalvarPerfil').onclick = async () => {
        await updateDoc(doc(db, "usuarios", currentUid), {
            nome: document.getElementById('profNomeInput').value,
            bio: document.getElementById('profBio').value
        });
        showToast("Dados Sincronizados");
    };

    document.getElementById('btnSair').onclick = () => signOut(auth);

    // --- FUNDO DE ESTRELAS ---
    const cv = document.getElementById('starCanvas');
    const cx = cv.getContext('2d');
    let st = [];
    function init() { cv.width = window.innerWidth; cv.height = window.innerHeight; st = []; for(let i=0; i<100; i++) st.push({x:Math.random()*cv.width, y:Math.random()*cv.height, s:Math.random()*1.5}); }
    function anim() { cx.clearRect(0,0,cv.width,cv.height); cx.fillStyle="#fff"; st.forEach(s => { cx.beginPath(); cx.arc(s.x, s.y, s.s, 0, Math.PI*2); cx.fill(); s.y -= 0.3; if(s.y<0) s.y=cv.height; }); requestAnimationFrame(anim); }
    init(); anim();
</script>
</body>
</html>
