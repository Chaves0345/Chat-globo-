<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatApp Elite | Cinematic Night</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #007bff; --accent: #00d4ff; --bg-dark: #010103; 
            --glass: rgba(255, 255, 255, 0.05); --text-main: #ffffff; 
            --success: #2ed573; --error: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: var(--bg-dark); color: var(--text-main); overflow: hidden; position: fixed; }

        /* --- CENÁRIO CINEMATOGRÁFICO --- */
        .universe { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 100%, #0a0a20 0%, #010103 100%); overflow: hidden; }
        .real-moon {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
            background-size: cover; border-radius: 50%;
            box-shadow: 0 0 80px rgba(255, 255, 255, 0.1), inset 20px -20px 50px rgba(0,0,0,0.8);
            opacity: 0.8; filter: brightness(0.9);
            animation: moonRotate 200s linear infinite;
        }
        @keyframes moonRotate { from { background-position: 0% 50%; } to { background-position: 100% 50%; } }
        .star-field { position: absolute; inset: 0; pointer-events: none; }

        /* --- TELAS E ANIMAÇÕES --- */
        .app-container { position: relative; z-index: 10; height: 100%; width: 100%; }
        .screen { 
            position: absolute; inset: 0; padding: 25px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; visibility: hidden; opacity: 0; overflow-y: auto;
            transform: translateY(15px);
        }
        .screen-active { visibility: visible; opacity: 1; transform: translateY(0); }

        /* --- NAVBAR --- */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(2,2,5,0.98); 
            display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 1000;
        }
        .nav-btn { font-size: 24px; opacity: 0.3; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .nav-btn:hover { transform: scale(1.2); }
        .nav-btn.active { opacity: 1; color: var(--primary); transform: scale(1.1); }

        /* --- MENSAGENS --- */
        .msg-bubble { cursor: pointer; transition: 0.3s; position: relative; animation: msgPop 0.3s ease-out; }
        @keyframes msgPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .msg-time { font-size: 9px; opacity: 0.4; margin-top: 4px; display: block; text-align: right; }
        .chat-img, .chat-video { max-width: 100%; border-radius: 12px; margin-top: 8px; display: block; border: 1px solid rgba(255,255,255,0.1); cursor: zoom-in; }

        /* --- NOVO: MODAL DE OPÇÕES ANIMADO (Substitui o confirm) --- */
        #action-sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            z-index: 11000; display: none; align-items: flex-end; justify-content: center;
        }
        #action-sheet {
            width: 100%; max-width: 500px; background: #0a0a15; border-radius: 25px 25px 0 0;
            padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #action-sheet-overlay.open { display: flex; }
        #action-sheet-overlay.open #action-sheet { transform: translateY(0); }
        .sheet-btn {
            width: 100%; padding: 18px; margin-bottom: 10px; border-radius: 15px; border: none;
            color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .btn-edit { background: var(--primary); }
        .btn-delete { background: rgba(255,71,87,0.2); color: #ff4757; }
        .btn-cancel { background: #222; }

        /* Fullscreen Image */
        #image-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
        #image-modal.open { display: flex; opacity: 1; }
        #full-image { max-width: 95%; max-height: 90%; border-radius: 10px; }

        /* Estilos Gerais */
        .glass-box { background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        input, textarea { width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 18px; color: white; margin-bottom: 12px; outline: none; }
        button { border: none; background: linear-gradient(135deg, var(--primary), var(--accent)); padding: 16px; border-radius: 18px; color: white; font-weight: 700; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="action-sheet-overlay" onclick="closeActionSheet()">
    <div id="action-sheet" onclick="event.stopPropagation()">
        <h4 style="text-align: center; margin-bottom: 20px; opacity: 0.7;">Opções da Mensagem</h4>
        <button id="sheetEditBtn" class="sheet-btn btn-edit">Editar Mensagem</button>
        <button id="sheetDeleteBtn" class="sheet-btn btn-delete">Apagar Mensagem</button>
        <button onclick="closeActionSheet()" class="sheet-btn btn-cancel">Cancelar</button>
    </div>
</div>

<div id="image-modal" onclick="closeFullscreen()"><img id="full-image" src=""></div>

<div class="universe">
    <div class="real-moon"></div>
    <div id="stars" class="star-field"></div>
</div>

<div class="app-container">
    <div id="login-screen" class="screen screen-active">
        <div class="glass-box" style="margin-top: 20vh;">
            <h1 style="text-align: center; margin-bottom: 20px;">Elite Chat</h1>
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnEntrar">Conectar-se</button>
            <button id="btnIrReg" style="background:none; color: var(--accent); margin-top: 10px; font-size:14px;">Criar nova conta</button>
        </div>
    </div>

    <div id="register-screen" class="screen">
        <div class="glass-box">
            <h2 style="margin-bottom:20px;">Nova Identidade</h2>
            <input type="text" id="regNome" placeholder="Seu apelido">
            <input type="email" id="regEmail" placeholder="E-mail">
            <input type="password" id="regPass" placeholder="Senha">
            <button id="btnConfirmarReg">Começar Jornada</button>
            <button id="btnVoltarLogin" style="background:none; margin-top:10px;">Voltar</button>
        </div>
    </div>

    <div id="home-screen" class="screen">
        <h1>Conversas</h1><br>
        <div id="cardGlobal" style="background:linear-gradient(45deg, #050510, #101030); padding:20px; border-radius:20px; border:1px solid var(--primary); cursor:pointer;">
            <strong>🌍 Chat Global</strong><br><small>Toque para entrar</small>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <h2 id="profNome" style="text-align:center;">Perfil</h2>
        <p id="profTag" style="text-align:center; color: var(--primary);">#0000</p>
        <textarea id="profBio" rows="4" style="margin-top:20px;"></textarea>
        <button id="btnSalvarPerfil">Salvar</button>
        <button id="btnSair" style="background:rgba(255,0,0,0.1); color:#ff4757; margin-top:10px;">Sair</button>
    </div>

    <div id="chat-screen" class="screen" style="background: #000; z-index: 5000; padding-bottom: 90px;">
        <div style="display:flex; align-items:center; gap:15px; padding-bottom:10px; border-bottom:1px solid #111;">
            <button id="btnVoltarChat" style="background:none; width:auto; font-size:24px;">←</button>
            <strong id="chat-title">Global Elite</strong>
        </div>
        <div id="chat-msgs" style="flex:1; overflow-y:auto; padding:15px 0; display:flex; flex-direction:column;"></div>
        <div style="display:flex; gap:10px; align-items: center; padding-top:10px;">
            <button onclick="document.getElementById('chatMediaInput').click()" style="background:var(--glass); width:50px;">📎</button>
            <input type="file" id="chatMediaInput" hidden accept="image/*,video/*">
            <input type="text" id="msgInput" placeholder="Mensagem..." style="margin:0; flex:1;">
            <button id="btnEnviar" style="width:60px;">➤</button>
        </div>
    </div>

    <div class="nav-bar hidden" id="main-nav">
        <div class="nav-btn active" id="nav-home">💬</div>
        <div class="nav-btn" id="nav-profile">👤</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, onSnapshot, orderBy, serverTimestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANKLtlqp8lb1En3SoONAoQHPa3bENTNG4",
        authDomain: "chat-61862.firebaseapp.com",
        projectId: "chat-61862",
        storageBucket: "chat-61862.firebasestorage.app",
        messagingSenderId: "843380257397",
        appId: "1:843380257397:web:d349c321c12b6f9aa0be3c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let editMsgId = null;
    let selectedMsgData = null;

    // --- ANIMAÇÃO DE MENU (ACTION SHEET) ---
    window.openActionSheet = (id, data) => {
        selectedMsgData = { id, ...data };
        document.getElementById('action-sheet-overlay').classList.add('open');
        // Esconde botão de editar se for mídia
        document.getElementById('sheetEditBtn').style.display = data.media ? 'none' : 'block';
    };

    window.closeActionSheet = () => {
        document.getElementById('action-sheet-overlay').classList.remove('open');
    };

    document.getElementById('sheetEditBtn').onclick = () => {
        editMsgId = selectedMsgData.id;
        document.getElementById('msgInput').value = selectedMsgData.texto;
        document.getElementById('chat-title').innerText = "Editando...";
        closeActionSheet();
        document.getElementById('msgInput').focus();
    };

    document.getElementById('sheetDeleteBtn').onclick = async () => {
        if(confirm("Deseja apagar esta mensagem permanentemente?")) {
            await deleteDoc(doc(db, "mensagens", selectedMsgData.id));
            closeActionSheet();
        }
    };

    // --- UTILS ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
        document.getElementById(id).classList.add('screen-active');
        const nav = document.getElementById('main-nav');
        if (id === 'login-screen' || id === 'register-screen') nav.classList.add('hidden');
        else nav.classList.remove('hidden');
    }

    window.openFullscreen = (src) => {
        const m = document.getElementById('image-modal');
        document.getElementById('full-image').src = src;
        m.classList.add('open');
    };
    window.closeFullscreen = () => document.getElementById('image-modal').classList.remove('open');

    function formatTime(date) {
        if (!date) return "";
        const d = date.toDate ? date.toDate() : new Date(date);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // --- LOGICA CHAT ---
    onAuthStateChanged(auth, (user) => {
        if (user) { showScreen('home-screen'); loadUserData(user.uid); }
        else showScreen('login-screen');
    });

    function loadChat() {
        const q = query(collection(db, "mensagens"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snaps) => {
            const area = document.getElementById('chat-msgs'); area.innerHTML = "";
            snaps.forEach(d => {
                const data = d.data();
                const isMe = data.uid === auth.currentUser.uid;
                const div = document.createElement('div');
                div.className = "msg-bubble";
                div.style.alignSelf = isMe ? 'flex-end' : 'flex-start';
                div.style.background = isMe ? 'var(--primary)' : '#222';
                div.style.padding = '12px 18px'; div.style.borderRadius = '20px'; div.style.margin = '5px 0'; div.style.maxWidth = '85%';
                
                if(isMe) div.onclick = () => openActionSheet(d.id, data);

                let html = `<small style="font-size:10px; opacity:0.5; font-weight:700;">${data.usuario}</small><br>`;
                if(data.media) {
                    html += data.tipo === 'video' ? `<video src="${data.media}" class="chat-video" controls></video>` : `<img src="${data.media}" class="chat-img" onclick="event.stopPropagation(); openFullscreen(this.src)">`;
                } else {
                    html += `<span>${data.texto}</span>`;
                }
                html += `<span class="msg-time">${formatTime(data.createdAt)}</span>`;
                div.innerHTML = html;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    document.getElementById('btnEnviar').onclick = async () => {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        if(editMsgId) {
            await updateDoc(doc(db, "mensagens", editMsgId), { texto: input.value });
            editMsgId = null;
            document.getElementById('chat-title').innerText = "Global Elite";
        } else {
            await addDoc(collection(db, "mensagens"), {
                texto: input.value, usuario: auth.currentUser.displayName, uid: auth.currentUser.uid, createdAt: serverTimestamp()
            });
        }
        input.value = "";
    };

    // Mídia
    document.getElementById('chatMediaInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async () => {
            await addDoc(collection(db, "mensagens"), {
                media: reader.result, tipo: file.type.split('/')[0],
                usuario: auth.currentUser.displayName, uid: auth.currentUser.uid, createdAt: serverTimestamp()
            });
        };
        reader.readAsDataURL(file);
    };

    // Navegação e Outros
    document.getElementById('cardGlobal').onclick = () => { showScreen('chat-screen'); loadChat(); };
    document.getElementById('nav-home').onclick = () => showScreen('home-screen');
    document.getElementById('nav-profile').onclick = () => showScreen('profile-screen');
    document.getElementById('btnVoltarChat').onclick = () => showScreen('home-screen');
    document.getElementById('btnSair').onclick = () => signOut(auth);
    document.getElementById('btnEntrar').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
    document.getElementById('btnIrReg').onclick = () => showScreen('register-screen');
    document.getElementById('btnConfirmarReg').onclick = async () => {
        const res = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regPass').value);
        await setDoc(doc(db, "usuarios", res.user.uid), { nome: document.getElementById('regNome').value, tag: Math.floor(1000+Math.random()*9000) });
        await updateProfile(res.user, { displayName: document.getElementById('regNome').value });
    };

    async function loadUserData(uid) {
        const d = await getDoc(doc(db, "usuarios", uid));
        if(d.exists()) {
            document.getElementById('profNome').innerText = d.data().nome;
            document.getElementById('profTag').innerText = "#" + d.data().tag;
        }
    }

    const stars = document.getElementById('stars');
    for(let i=0; i<70; i++) {
        const s = document.createElement('div');
        s.style.position='absolute'; s.style.background='white'; s.style.width='2px'; s.style.height='2px';
        s.style.top=Math.random()*100+'%'; s.style.left=Math.random()*100+'%';
        stars.appendChild(s);
    }
</script>
</body>
</html>
