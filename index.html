<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Chat | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #007bff; --accent: #00d4ff; --bg-dark: #010103; 
            --glass: rgba(255, 255, 255, 0.08); --text-main: #ffffff; 
            --success: #2ed573; --error: #ff4757;
            --xp-bar: linear-gradient(90deg, #8e2de2, #4a00e0);
            --neon-glow: 0 0 15px rgba(0, 123, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: var(--bg-dark); color: var(--text-main); overflow: hidden; position: fixed; }

        #starCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .app-container { position: relative; z-index: 10; height: 100%; width: 100%; }
        
        .screen { 
            position: absolute; inset: 0; padding: 20px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; visibility: hidden; opacity: 0; overflow-y: auto;
            transform: scale(0.95);
        }
        .screen-active { visibility: visible; opacity: 1; transform: scale(1); }

        .msg-bubble { margin: 10px 0; max-width: 85%; position: relative; animation: msgPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes msgPop { from { opacity: 0; transform: translateY(20px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .msg-content { padding: 12px; border-radius: 18px; font-size: 14px; position: relative; word-wrap: break-word; transition: 0.3s; }

        .nav-bar { 
            position: fixed; bottom: -80px; left: 0; width: 100%; height: 70px; 
            background: rgba(5,5,10,0.8); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .nav-bar.show { bottom: 0; }
        .nav-btn { font-size: 24px; opacity: 0.3; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--primary); text-shadow: var(--neon-glow); }

        /* MODAIS E SHEETS */
        #overlay-sheet, #overlay-edit { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 5000; display: none; align-items: flex-end; backdrop-filter: blur(8px); }
        #overlay-edit { align-items: center; justify-content: center; padding: 20px; }

        .sheet { 
            width: 100%; background: linear-gradient(to top, #0c0c1a, #151530); 
            border-radius: 30px 30px 0 0; padding: 25px; transform: translateY(100%); 
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            border-top: 2px solid var(--primary);
        }

        .edit-modal {
            width: 100%; max-width: 400px; background: #0c0c1a; border: 1px solid var(--primary);
            border-radius: 25px; padding: 25px; box-shadow: var(--neon-glow);
            transform: scale(0.8); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sheet-btn { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 18px; background: var(--glass); color: white; border: 1px solid rgba(255,255,255,0.05); font-weight: bold; }

        input, textarea { width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; color: white; margin-bottom: 10px; outline: none; }
        button { border: none; background: linear-gradient(135deg, var(--primary), var(--accent)); padding: 15px; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div id="fullscreen-view" onclick="this.style.display='none'" style="position: fixed; inset: 0; background: #000; z-index: 10000; display: none; align-items: center; justify-content: center;">
    <img id="img-full" src="" style="max-width: 100%; max-height: 100%;">
</div>

<div id="overlay-sheet" onclick="closeSheet()">
    <div class="sheet" id="sheet-content" onclick="event.stopPropagation()">
        <div style="width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px;"></div>
        <button id="btn-edit-trigger" class="sheet-btn">✨ Editar Mensagem</button>
        <button id="btn-delete" class="sheet-btn" style="color: var(--error);">🗑️ Apagar para todos</button>
        <button onclick="closeSheet()" class="sheet-btn" style="opacity: 0.5;">Cancelar</button>
    </div>
</div>

<div id="overlay-edit">
    <div class="edit-modal" id="edit-modal-box">
        <h3 style="margin-bottom: 15px; color: var(--accent);">Editar Transmissão</h3>
        <textarea id="edit-input" rows="4" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);"></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="closeEditModal()" style="flex: 1; background: var(--glass);">Cancelar</button>
            <button id="btn-save-edit" style="flex: 2;">Confirmar Alteração</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div id="login-screen" class="screen screen-active">
        <div style="margin-top: 20vh; text-align: center;">
            <h1 style="font-size: 38px; font-weight: 800; text-shadow: var(--neon-glow);">Elite Chat</h1>
            <p style="opacity: 0.5; margin-bottom: 40px; letter-spacing: 2px;">PREMIUM SYSTEM</p>
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="btnEntrar" style="width: 100%; box-shadow: var(--neon-glow);">CONECTAR</button>
            <button onclick="navigateTo('register-screen')" style="background:none; margin-top:15px; font-size: 13px; opacity: 0.7;">Novo por aqui? Criar conta</button>
        </div>
    </div>

    <div id="register-screen" class="screen">
        <h2 style="margin-bottom: 20px;">Criar Conta</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <img id="regPfpPreview" src="https://via.placeholder.com/150" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border: 2px solid var(--primary);" onclick="document.getElementById('regPfpInput').click()">
            <input type="file" id="regPfpInput" hidden accept="image/*">
        </div>
        <input type="text" id="regNome" placeholder="Nome de usuário">
        <input type="email" id="regEmail" placeholder="E-mail">
        <input type="password" id="regPass" placeholder="Senha">
        <button id="btnConfirmarReg" style="width: 100%;">FINALIZAR</button>
    </div>

    <div id="home-screen" class="screen">
        <h1 style="margin-bottom: 20px; font-weight: 700;">Início</h1>
        <div id="cardGlobal" style="background:linear-gradient(45deg, #0a0a25, #151540); padding:30px; border-radius:25px; border:1px solid var(--primary); cursor:pointer;">
            <strong style="font-size: 20px;">🌍 Chat Global Elite</strong><br>
            <span style="opacity:0.6; font-size: 13px;">Toque para entrar</span>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div style="text-align: center; margin-bottom: 25px;">
            <img id="profImg" src="" style="width:120px; height:120px; border-radius:50%; border: 3px solid var(--primary); object-fit:cover;">
        </div>
        <div class="xp-card" style="background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 15px;">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom: 5px;">
                <span id="labelXP">XP: 0/100</span><span id="statRank" style="color: var(--accent);">Recruta</span>
            </div>
            <div style="width: 100%; height: 8px; background: #000; border-radius: 10px; overflow: hidden;">
                <div id="barXP" style="height: 100%; background: var(--xp-bar); width: 0%;"></div>
            </div>
            <div style="display:flex; justify-content:space-around; margin-top:15px; text-align:center;">
                <div><small style="opacity:0.5;">ENVIO</small><br><strong id="statMsgs">0</strong></div>
                <div><small style="opacity:0.5;">NÍVEL</small><br><strong id="statLevel">0</strong></div>
            </div>
        </div>
        <input type="text" id="profNomeInput" placeholder="Nome">
        <textarea id="profBio" rows="2" placeholder="Bio..."></textarea>
        <button id="btnSalvarPerfil" style="width: 100%;">SALVAR ALTERAÇÕES</button>
        <button id="btnSair" style="background:none; color:var(--error); margin-top:15px;">Sair</button>
    </div>

    <div id="chat-screen" class="screen" style="padding-bottom: 80px; padding-top: 10px;">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
            <button onclick="navigateTo('home-screen')" style="background:none; font-size:24px; color: white;">←</button>
            <strong>Chat Global</strong>
        </div>
        <div id="chat-msgs" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap: 4px;"></div>
        <div style="display:flex; gap:8px; padding:10px 0; align-items:center;">
            <button id="btnAnexo" style="background:var(--glass); padding: 12px; border-radius: 15px;">📎</button>
            <input type="file" id="chatMediaInput" hidden accept="image/*,video/*">
            <input type="text" id="msgInput" placeholder="Mensagem..." style="margin:0; flex:1; border-radius: 25px;">
            <button id="btnEnviar" style="border-radius: 50%; width: 48px; height: 48px; padding: 0;">➤</button>
        </div>
    </div>

    <div class="nav-bar" id="main-nav">
        <div class="nav-btn active" id="nav-home" onclick="navigateTo('home-screen')">💬</div>
        <div class="nav-btn" id="nav-prof" onclick="navigateTo('profile-screen')">👤</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, onSnapshot, orderBy, serverTimestamp, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANKLtlqp8lb1En3SoONAoQHPa3bENTNG4",
        authDomain: "chat-61862.firebaseapp.com",
        projectId: "chat-61862",
        storageBucket: "chat-61862.firebasestorage.app",
        messagingSenderId: "843380257397",
        appId: "1:843380257397:web:d349c321c12b6f9aa0be3c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUserId = null;
    let pressTimer;

    // Navegação
    window.navigateTo = function(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
        document.getElementById(id).classList.add('screen-active');
        const nav = document.getElementById('main-nav');
        nav.classList.toggle('show', id === 'home-screen' || id === 'profile-screen');
        document.getElementById('nav-home').classList.toggle('active', id === 'home-screen');
        document.getElementById('nav-prof').classList.toggle('active', id === 'profile-screen');
    };

    onAuthStateChanged(auth, (user) => {
        if(user) {
            currentUserId = user.uid;
            onSnapshot(doc(db, "usuarios", user.uid), (d) => {
                if(d.exists()){
                    const data = d.data();
                    document.getElementById('profNomeInput').value = data.nome || "";
                    document.getElementById('profBio').value = data.bio || "";
                    document.getElementById('profImg').src = data.pfp || "https://via.placeholder.com/150";
                    const xp = data.xp || 0;
                    document.getElementById('labelXP').innerText = `XP: ${xp % 100}/100`;
                    document.getElementById('barXP').style.width = (xp % 100) + "%";
                    document.getElementById('statLevel').innerText = Math.floor(xp / 100);
                    document.getElementById('statMsgs').innerText = data.totalMsgs || 0;
                    if(document.querySelector('.screen-active').id === 'login-screen') navigateTo('home-screen');
                }
            });
        } else navigateTo('login-screen');
    });

    // Envio
    async function sendMsg(text = "", media = null, type = "text") {
        if(!text && !media) return;
        const user = auth.currentUser;
        await addDoc(collection(db, "mensagens"), {
            texto: text, media: media, tipo: type,
            uid: user.uid, usuario: document.getElementById('profNomeInput').value,
            createdAt: serverTimestamp()
        });
        await updateDoc(doc(db, "usuarios", user.uid), { xp: increment(5), totalMsgs: increment(1) });
    }

    document.getElementById('btnEnviar').onclick = () => {
        const input = document.getElementById('msgInput');
        if(input.value.trim() !== "") { sendMsg(input.value); input.value = ""; }
    };

    document.getElementById('btnAnexo').onclick = () => document.getElementById('chatMediaInput').click();
    
    document.getElementById('chatMediaInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const type = file.type.includes('video') ? 'video' : 'image';
            sendMsg("", ev.target.result, type);
        };
        reader.readAsDataURL(file);
    };

    // Chat
    window.loadChat = () => {
        const q = query(collection(db, "mensagens"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snaps) => {
            const area = document.getElementById('chat-msgs');
            area.innerHTML = "";
            snaps.forEach(d => {
                const data = d.data();
                const isMe = data.uid === currentUserId;
                const date = data.createdAt ? new Date(data.createdAt.toDate()) : new Date();
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                const div = document.createElement('div');
                div.className = "msg-bubble";
                div.style.alignSelf = isMe ? 'flex-end' : 'flex-start';
                
                div.ontouchstart = () => pressTimer = setTimeout(() => openSheet(d.id, data), 600);
                div.ontouchend = () => clearTimeout(pressTimer);
                div.onmousedown = () => pressTimer = setTimeout(() => openSheet(d.id, data), 600);
                div.onmouseup = () => clearTimeout(pressTimer);

                div.innerHTML = `<div class="msg-content" style="background:${isMe ? 'var(--primary)' : 'rgba(255,255,255,0.1)'}; ${isMe ? 'box-shadow: var(--neon-glow);' : ''}">
                    <small style="font-size:9px; color: var(--accent); font-weight:bold;">${data.usuario}</small>
                    ${data.media ? (data.tipo === 'video' ? `<video src="${data.media}" controls style="width:100%; border-radius:10px; margin-top:5px;"></video>` : `<img src="${data.media}" style="width:100%; border-radius:10px; margin-top:5px;" onclick="window.openFullImg('${data.media}')">`) : ''}
                    <div style="margin-top:2px;">${data.texto || ''}</div>
                    <span style="font-size:8px; opacity:0.5; display:block; text-align:right; margin-top:4px;">${timeStr}</span>
                </div>`;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    };

    window.openFullImg = (src) => {
        document.getElementById('img-full').src = src;
        document.getElementById('fullscreen-view').style.display = 'flex';
    };

    // --- SISTEMA DE EDIÇÃO ANIMADO ---
    window.openSheet = (id, data) => {
        if(data.uid !== currentUserId) return;
        document.getElementById('overlay-sheet').style.display = 'flex';
        setTimeout(() => document.getElementById('sheet-content').style.transform = 'translateY(0)', 50);
        
        document.getElementById('btn-delete').onclick = async () => { if(confirm("Apagar?")) await deleteDoc(doc(db, "mensagens", id)); closeSheet(); };
        
        // Abre o novo modal em vez do prompt
        document.getElementById('btn-edit-trigger').onclick = () => {
            closeSheet();
            openEditModal(id, data.texto);
        };
    };

    window.openEditModal = (id, currentText) => {
        document.getElementById('edit-input').value = currentText;
        document.getElementById('overlay-edit').style.display = 'flex';
        setTimeout(() => document.getElementById('edit-modal-box').style.transform = 'scale(1)', 50);

        document.getElementById('btn-save-edit').onclick = async () => {
            const newText = document.getElementById('edit-input').value;
            if(newText.trim() !== "") {
                await updateDoc(doc(db, "mensagens", id), { texto: newText });
                closeEditModal();
            }
        };
    };

    window.closeEditModal = () => {
        document.getElementById('edit-modal-box').style.transform = 'scale(0.8)';
        setTimeout(() => document.getElementById('overlay-edit').style.display = 'none', 300);
    };

    window.closeSheet = () => {
        document.getElementById('sheet-content').style.transform = 'translateY(100%)';
        setTimeout(() => document.getElementById('overlay-sheet').style.display = 'none', 300);
    };

    // Estrelas
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.4, z: Math.random()*2 });
    }
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size * s.z, 0, Math.PI*2); ctx.fill();
            s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
        });
        requestAnimationFrame(animate);
    }
    initStars(); animate();

    document.getElementById('btnEntrar').onclick = async () => {
        const e = document.getElementById('loginEmail').value;
        const p = document.getElementById('loginPass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { alert("Erro login."); }
    };
    document.getElementById('btnSalvarPerfil').onclick = async function() {
        await updateDoc(doc(db, "usuarios", currentUserId), { nome: document.getElementById('profNomeInput').value, bio: document.getElementById('profBio').value });
    };
    document.getElementById('cardGlobal').onclick = () => { navigateTo('chat-screen'); loadChat(); };
    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
